<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>EcoAR · Experiencia AR</title>

  <!-- A-Frame (motor 3D) y AR.js (WebAR con marcadores) — librerías open source y gratuitas -->
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

  <style>
    html, body { margin: 0; padding: 0; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #000; }
    a-scene { width: 100vw; height: 100vh; display: block; }

    /* HUD overlay */
    #hud {
      position: fixed; inset: 0; pointer-events: none; z-index: 10;
      display: flex; flex-direction: column; justify-content: space-between;
    }
    #top {
      pointer-events: auto;
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 14px;
      background: linear-gradient(180deg, rgba(0,0,0,0.55), rgba(0,0,0,0));
      color: white;
    }
    #top .title { font-weight: 700; font-size: 15px; display: flex; align-items: center; gap: 8px; }
    #top .pill {
      font-size: 12px; padding: 4px 10px; border-radius: 999px;
      background: rgba(255,255,255,0.18); backdrop-filter: blur(8px);
    }
    #top a.back {
      color: white; text-decoration: none;
      width: 36px; height: 36px; border-radius: 50%;
      background: rgba(255,255,255,0.2); backdrop-filter: blur(8px);
      display: flex; align-items: center; justify-content: center; font-size: 18px;
    }

    /* Tarjeta de instrucción */
    #panel {
      pointer-events: auto;
      margin: 0 14px 16px;
      background: rgba(255, 255, 255, 0.96);
      backdrop-filter: blur(12px);
      border-radius: 18px;
      padding: 16px 18px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.35);
      color: #1c1f22;
    }
    #panel .label {
      font-size: 11px; font-weight: 700; letter-spacing: 0.08em;
      text-transform: uppercase; color: #1f7a3a;
    }
    #panel h2 { margin: 4px 0 4px; font-size: 20px; }
    #panel .tip { font-size: 14px; color: #555c63; line-height: 1.45; margin-bottom: 12px; }
    #panel .destino {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; border-radius: 12px;
      background: #f6f8f6; border: 1px solid #e6e8ea;
    }
    #panel .bag-icon {
      width: 32px; height: 32px; border-radius: 50% 50% 8px 8px;
      border: 2px solid #ccc;
    }
    #panel .bag-icon.blanca { background: #ffffff; border-color: #aaa; }
    #panel .bag-icon.negra { background: #1a1a1a; border-color: #000; }
    #panel .bag-icon.verde { background: #2ea75a; border-color: #176a30; }
    #panel .destino strong { font-size: 14px; }
    #panel .destino small { display: block; font-size: 12px; color: #555c63; }
    #panel .buttons { display: flex; gap: 8px; margin-top: 10px; }
    #panel button {
      flex: 1; pointer-events: auto;
      background: #1f7a3a; color: #fff;
      border: none; border-radius: 999px;
      padding: 10px 14px; font-size: 13px; font-weight: 600;
      cursor: pointer;
    }
    #panel button.alt {
      background: #ffffff; color: #1f7a3a; border: 1.5px solid #1f7a3a;
    }

    /* Vista previa (sin AR) */
    body.preview a-scene { background: linear-gradient(180deg, #cfe9d6, #f6f8f6); }

    /* Loader inicial */
    #loader {
      position: fixed; inset: 0; background: #1f7a3a; color: white;
      display: flex; align-items: center; justify-content: center; flex-direction: column;
      z-index: 50; gap: 14px;
    }
    #loader .spinner {
      width: 42px; height: 42px;
      border-radius: 50%;
      border: 4px solid rgba(255,255,255,0.25);
      border-top-color: #ffffff;
      animation: spin 0.9s linear infinite;
    }
    #loader p { font-size: 14px; opacity: 0.9; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Aviso si no hay marcador */
    #hint {
      position: fixed; bottom: 170px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.7); color: white; padding: 8px 14px;
      border-radius: 999px; font-size: 12px; z-index: 5;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <div id="loader">
    <div class="spinner"></div>
    <p id="loaderText">Iniciando experiencia AR…</p>
  </div>

  <!-- HUD -->
  <div id="hud">
    <div id="top">
      <a class="back" href="index.html" title="Volver">←</a>
      <div class="title"><span id="hudIcon">🧴</span><span id="hudName">Cargando…</span></div>
      <span class="pill" id="modePill">Modo AR</span>
    </div>

    <div id="panel">
      <div class="label">Indicación EcoAR</div>
      <h2 id="itemName">—</h2>
      <p class="tip" id="itemTip">—</p>
      <div class="destino">
        <div class="bag-icon" id="bagIcon"></div>
        <div>
          <strong id="bagLabel">—</strong>
          <small id="bagDesc">—</small>
        </div>
      </div>
      <div class="buttons">
        <button id="animBtn">Mostrar destino</button>
        <button class="alt" id="modeBtn">Vista previa 3D</button>
      </div>
    </div>
  </div>

  <div id="hint">Apunta la cámara al marcador HIRO</div>

  <!-- Escena AR -->
  <a-scene
    id="scene"
    embedded
    vr-mode-ui="enabled: false"
    arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;"
    renderer="logarithmicDepthBuffer: true; precision: medium;"
    loading-screen="enabled: false">

    <a-assets timeout="10000">
      <!-- Modelos 3D libres (Khronos Sample Models, licencia CC BY 4.0) -->
      <a-asset-item id="model-botella" src="https://cdn.jsdelivr.net/gh/KhronosGroup/glTF-Sample-Models@master/2.0/WaterBottle/glTF-Binary/WaterBottle.glb"></a-asset-item>
      <a-asset-item id="model-cascara" src="https://cdn.jsdelivr.net/gh/KhronosGroup/glTF-Sample-Models@master/2.0/Avocado/glTF-Binary/Avocado.glb"></a-asset-item>
      <a-asset-item id="model-caja" src="https://cdn.jsdelivr.net/gh/KhronosGroup/glTF-Sample-Models@master/2.0/BoxTextured/glTF-Binary/BoxTextured.glb"></a-asset-item>
    </a-assets>

    <!-- Marcador HIRO (clásico, viene incluido en AR.js) -->
    <a-marker preset="hiro" id="marker" emitevents="true">
      <a-entity id="sceneRoot" position="0 0 0">

        <!-- Suelo decorativo (sutil) -->
        <a-ring color="#1f7a3a" radius-inner="0.55" radius-outer="0.6"
                rotation="-90 0 0" position="0 -0.01 0" opacity="0.5"></a-ring>

        <!-- Contenedor del item (animación flotación) -->
        <a-entity id="itemHolder" position="0 0.4 0"
                  animation__float="property: position; to: 0 0.55 0; dir: alternate; loop: true; dur: 1500; easing: easeInOutSine">
          <!-- El modelo se inserta dinámicamente aquí -->
        </a-entity>

        <!-- Caneca destino -->
        <a-entity id="bin" position="0.85 0 0">
          <!-- Cuerpo cilíndrico -->
          <a-cylinder id="binBody" radius="0.18" height="0.45" position="0 0.22 0"
                      color="#cccccc" material="roughness: 0.7"></a-cylinder>
          <!-- Tapa -->
          <a-cylinder id="binLid" radius="0.19" height="0.04" position="0 0.46 0"
                      color="#999999"></a-cylinder>
          <!-- Etiqueta -->
          <a-text id="binLabel" value="—" align="center" position="0 0.6 0"
                  color="#fff" width="2" font="kelsonsans"
                  geometry="primitive: plane; width: 0.6; height: 0.12"
                  material="color: #1f7a3a; opacity: 0.9"></a-text>
        </a-entity>

        <!-- Flecha de dirección -->
        <a-entity id="arrow" position="0.4 0.45 0" visible="false">
          <a-cone color="#ffeb3b" radius-bottom="0.06" radius-top="0" height="0.15"
                  rotation="0 0 -90"
                  animation="property: position; to: 0.55 0.45 0; dir: alternate; loop: true; dur: 700"></a-cone>
        </a-entity>

        <!-- Panel flotante de texto 3D -->
        <a-entity id="floatPanel" position="0 0.95 0" visible="true"
                  look-at="[camera]">
          <a-plane width="1.4" height="0.32" color="#ffffff" opacity="0.95"
                   material="shader: flat"></a-plane>
          <a-text id="floatText" value=""
                  align="center" color="#1f7a3a"
                  width="1.3" position="0 0 0.01"
                  wrap-count="22"></a-text>
        </a-entity>
      </a-entity>
    </a-marker>

    <!-- Cámara AR -->
    <a-entity camera></a-entity>
  </a-scene>

  <script>
    // ---------- Configuración por residuo ----------
    const ITEMS = {
      botella: {
        name: "Botella PET",
        icon: "🧴",
        tip: "Vacía el envase, enjuágalo y aplástalo. Si está limpio y seco, es aprovechable.",
        bag: "blanca",
        bagLabel: "Bolsa BLANCA",
        bagDesc: "Aprovechables: plástico limpio.",
        binColor: "#ffffff",
        binBorder: "#cfcfcf",
        labelColor: "#1f1f1f",
        modelAsset: "#model-botella",
        modelScale: "5 5 5",
        modelRot: "0 0 0",
        fallbackPrimitive: "bottle"
      },
      empaque: {
        name: "Empaque de domicilio",
        icon: "🍱",
        tip: "Si está contaminado con comida o aceite, no se puede aprovechar. Va a la bolsa negra.",
        bag: "negra",
        bagLabel: "Bolsa NEGRA",
        bagDesc: "No aprovechables: empaques sucios.",
        binColor: "#1a1a1a",
        binBorder: "#000000",
        labelColor: "#ffffff",
        modelAsset: null,                  // Sin GLB — usa primitiva
        fallbackPrimitive: "container"
      },
      cascara: {
        name: "Cáscara de fruta",
        icon: "🍌",
        tip: "Residuo orgánico. Va a la bolsa verde para compostaje o aprovechamiento biológico.",
        bag: "verde",
        bagLabel: "Bolsa VERDE",
        bagDesc: "Orgánicos: restos de comida y jardín.",
        binColor: "#2ea75a",
        binBorder: "#176a30",
        labelColor: "#ffffff",
        modelAsset: "#model-cascara",
        modelScale: "8 8 8",
        modelRot: "0 0 0",
        fallbackPrimitive: "fruit"
      },
      caja: {
        name: "Caja de cartón",
        icon: "📦",
        tip: "Aplánala y manténla seca. El cartón limpio es 100% aprovechable.",
        bag: "blanca",
        bagLabel: "Bolsa BLANCA",
        bagDesc: "Aprovechables: cartón limpio y seco.",
        binColor: "#ffffff",
        binBorder: "#cfcfcf",
        labelColor: "#1f1f1f",
        modelAsset: "#model-caja",
        modelScale: "0.7 0.7 0.7",
        modelRot: "0 30 0",
        fallbackPrimitive: "box"
      }
    };

    // ---------- Leer parámetro ----------
    const params = new URLSearchParams(window.location.search);
    const key = params.get("item") || "botella";
    const cfg = ITEMS[key] || ITEMS.botella;

    // ---------- Llenar HUD ----------
    document.getElementById("hudIcon").textContent = cfg.icon;
    document.getElementById("hudName").textContent = cfg.name;
    document.getElementById("itemName").textContent = cfg.name;
    document.getElementById("itemTip").textContent = cfg.tip;
    document.getElementById("bagLabel").textContent = cfg.bagLabel;
    document.getElementById("bagDesc").textContent = cfg.bagDesc;
    document.getElementById("bagIcon").className = "bag-icon " + cfg.bag;
    document.title = "EcoAR · " + cfg.name;

    // ---------- Crear modelo 3D ----------
    const itemHolder = document.getElementById("itemHolder");

    function buildFallbackPrimitive(type) {
      // Modelos compuestos por primitivas si el GLB no carga
      const root = document.createElement("a-entity");
      if (type === "bottle") {
        root.innerHTML = `
          <a-cylinder color="#42a5f5" radius="0.08" height="0.3" opacity="0.7" material="roughness: 0.2; metalness: 0.1"></a-cylinder>
          <a-cylinder color="#1976d2" radius="0.04" height="0.08" position="0 0.19 0"></a-cylinder>
          <a-cylinder color="#0d47a1" radius="0.045" height="0.02" position="0 0.24 0"></a-cylinder>
          <a-plane color="#ffffff" width="0.13" height="0.07" position="0 0 0.081" material="shader: flat"></a-plane>`;
        root.setAttribute("animation", "property: rotation; to: 0 360 0; loop: true; dur: 6000; easing: linear");
      } else if (type === "container") {
        root.innerHTML = `
          <a-box color="#bcaaa4" depth="0.25" width="0.3" height="0.12" material="roughness: 0.9"></a-box>
          <a-box color="#8d6e63" depth="0.25" width="0.3" height="0.015" position="0 0.067 0"></a-box>
          <a-plane color="#ffccbc" width="0.15" height="0.05" position="0 0.075 0" rotation="-90 0 0"></a-plane>`;
        root.setAttribute("animation", "property: rotation; to: 0 360 0; loop: true; dur: 6000; easing: linear");
      } else if (type === "fruit") {
        root.innerHTML = `
          <a-sphere color="#ffeb3b" radius="0.08" position="0 0 0" scale="1 0.6 0.4"></a-sphere>
          <a-cylinder color="#827717" radius="0.008" height="0.05" position="0 0.05 0"></a-cylinder>`;
        root.setAttribute("animation", "property: rotation; to: 0 360 0; loop: true; dur: 6000; easing: linear");
      } else if (type === "box") {
        root.innerHTML = `
          <a-box color="#a1887f" depth="0.25" width="0.25" height="0.18" material="roughness: 0.95"></a-box>
          <a-box color="#8d6e63" depth="0.26" width="0.005" height="0.18"></a-box>
          <a-box color="#8d6e63" depth="0.005" width="0.26" height="0.18"></a-box>`;
        root.setAttribute("animation", "property: rotation; to: 0 360 0; loop: true; dur: 6000; easing: linear");
      }
      return root;
    }

    let modelEl = null;
    function placeModel() {
      itemHolder.innerHTML = "";
      if (cfg.modelAsset) {
        modelEl = document.createElement("a-entity");
        modelEl.setAttribute("gltf-model", cfg.modelAsset);
        modelEl.setAttribute("scale", cfg.modelScale);
        modelEl.setAttribute("rotation", cfg.modelRot);
        modelEl.setAttribute("animation", "property: rotation; to: " + addRotY(cfg.modelRot, 360) + "; loop: true; dur: 6000; easing: linear");
        modelEl.addEventListener("model-error", () => {
          // Si falla la carga, mostrar primitiva
          itemHolder.innerHTML = "";
          itemHolder.appendChild(buildFallbackPrimitive(cfg.fallbackPrimitive));
        });
        itemHolder.appendChild(modelEl);
      } else {
        itemHolder.appendChild(buildFallbackPrimitive(cfg.fallbackPrimitive));
      }
    }
    function addRotY(rot, delta) {
      const p = rot.split(" ").map(Number);
      return `${p[0]} ${p[1] + delta} ${p[2]}`;
    }
    placeModel();

    // ---------- Configurar caneca ----------
    document.getElementById("binBody").setAttribute("color", cfg.binColor);
    document.getElementById("binLid").setAttribute("color", cfg.binBorder);
    const binLabel = document.getElementById("binLabel");
    binLabel.setAttribute("value", cfg.bagLabel);
    binLabel.setAttribute("color", cfg.labelColor === "#ffffff" ? "#ffffff" : "#1f1f1f");

    // ---------- Panel flotante 3D ----------
    document.getElementById("floatText").setAttribute("value", cfg.tip);

    // ---------- Animación: mover item a caneca ----------
    let played = false;
    function playDropAnimation() {
      if (played) {
        // reiniciar
        itemHolder.setAttribute("position", "0 0.4 0");
        document.getElementById("arrow").setAttribute("visible", "false");
        setTimeout(() => played = false, 100);
        return;
      }
      played = true;
      document.getElementById("arrow").setAttribute("visible", "true");
      // Mover en X hacia la caneca con caída
      itemHolder.removeAttribute("animation__float");
      itemHolder.setAttribute("animation__move",
        "property: position; from: 0 0.4 0; to: 0.85 0.45 0; dur: 1200; easing: easeOutCubic");
      setTimeout(() => {
        itemHolder.setAttribute("animation__drop",
          "property: position; to: 0.85 0.05 0; dur: 600; easing: easeInQuad");
        // Pulso en la caneca
        document.getElementById("binBody").setAttribute("animation",
          "property: scale; from: 1 1 1; to: 1.15 1.15 1.15; dir: alternate; loop: 3; dur: 200");
      }, 1300);
      setTimeout(() => {
        // Restablecer
        itemHolder.setAttribute("position", "0 0.4 0");
        itemHolder.setAttribute("animation__float",
          "property: position; to: 0 0.55 0; dir: alternate; loop: true; dur: 1500; easing: easeInOutSine");
        document.getElementById("arrow").setAttribute("visible", "false");
        played = false;
      }, 3000);
    }
    document.getElementById("animBtn").addEventListener("click", playDropAnimation);

    // ---------- Modo Vista previa 3D (sin AR) ----------
    const modeBtn = document.getElementById("modeBtn");
    const modePill = document.getElementById("modePill");
    const hint = document.getElementById("hint");
    const scene = document.getElementById("scene");
    let previewMode = false;

    function enablePreview() {
      previewMode = true;
      document.body.classList.add("preview");
      // Quitar AR.js, mostrar escena directa
      scene.removeAttribute("arjs");
      scene.setAttribute("background", "color: #cfe9d6");
      // Hacer la escena visible sin marcador: forzar visibilidad
      const marker = document.getElementById("marker");
      marker.object3D.visible = true;
      marker.setAttribute("markerhandler", "");
      // Reemplazar marker por entity normal con posición
      const root = document.getElementById("sceneRoot");
      root.setAttribute("position", "0 -0.3 -1.8");
      root.setAttribute("scale", "1.4 1.4 1.4");
      // Añadir cámara orbital
      const cam = document.querySelector("a-entity[camera]");
      cam.setAttribute("position", "0 0.6 0");
      cam.setAttribute("look-controls", "enabled: true; touchEnabled: true");
      // Añadir luz
      const light1 = document.createElement("a-light");
      light1.setAttribute("type", "ambient"); light1.setAttribute("color", "#ffffff"); light1.setAttribute("intensity", "0.7");
      scene.appendChild(light1);
      const light2 = document.createElement("a-light");
      light2.setAttribute("type", "directional"); light2.setAttribute("position", "1 2 1"); light2.setAttribute("intensity", "0.6");
      scene.appendChild(light2);

      modePill.textContent = "Vista previa 3D";
      modeBtn.textContent = "Modo AR (escanea HIRO)";
      hint.textContent = "Arrastra para rotar la escena";
    }
    function enableAR() {
      window.location.reload();
    }
    modeBtn.addEventListener("click", () => {
      if (!previewMode) enablePreview(); else enableAR();
    });

    // ---------- Ocultar loader ----------
    scene.addEventListener("loaded", () => {
      setTimeout(() => {
        document.getElementById("loader").style.display = "none";
      }, 600);
    });
    // fallback en caso de carga lenta
    setTimeout(() => {
      const l = document.getElementById("loader");
      if (l) l.style.display = "none";
    }, 6000);

    // ---------- Detectar si no hay cámara y proponer vista previa ----------
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      document.getElementById("loaderText").textContent = "Tu navegador no soporta cámara — activando vista previa 3D…";
      setTimeout(enablePreview, 1200);
    }

    // ---------- Marcador detectado ----------
    document.getElementById("marker").addEventListener("markerFound", () => {
      hint.style.display = "none";
    });
    document.getElementById("marker").addEventListener("markerLost", () => {
      if (!previewMode) hint.style.display = "block";
    });
  </script>
</body>
</html>
